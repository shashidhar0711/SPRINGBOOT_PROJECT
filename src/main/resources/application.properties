spring.application.name=SPRING_PROJECT

# PostgreSQL Connection Details
spring.datasource.url=jdbc:postgresql://localhost:5432/productservice
spring.datasource.username=productuser
spring.datasource.password=sasic
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional: suppress a common Hibernate warning with PostgreSQL CLOBs
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true